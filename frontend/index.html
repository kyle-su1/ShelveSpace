<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BookList</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>My Bookshelf</h1>

    <!-- Auth -->
    <section id="auth-section">
      <h2>Account</h2>

      <form id="signup-form">
        <h3>Sign Up</h3>
        <input type="email" id="signup-email" placeholder="Email" required />
        <input type="text" id="signup-username" placeholder="Username" required />
        <input type="password" id="signup-password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>

      <form id="login-form">
        <h3>Log In</h3>
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Log In</button>
      </form>

      <button id="logout-btn" hidden>Log Out</button>
      <div id="auth-message" style="margin-top: 8px;"></div>
    </section>

    <section id="add-book" hidden>
      <h2>Add Book</h2>

      <div class="modes">
        <button id="manual-mode" class="active">Manual</button>
        <button id="search-mode">Search</button>
      </div>

      <!-- Manual form -->
      <form id="book-form">
        <input type="text" id="title" placeholder="Title" required />
        <input type="text" id="author" placeholder="Author" required />
        <input type="url" id="cover" placeholder="Cover image URL (optional)" />
        <button type="submit">Add</button>
      </form>

      <!-- Google search -->
      <div id="search-form" hidden>
        <input type="text" id="search-input" placeholder="Search books..." />
        <button id="search-btn">Search</button>
        <div id="search-results"></div>
      </div>
    </section>

    <section id="bookshelf" hidden>
      <h2>Books</h2>
      <div id="book-list"></div>
    </section>

    <script src="script.js"></script>
  </div>
</body>
</html>
